<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elliott — Recruit & Train</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>Elliott</h1>
            </div>

            <div class="mode-section">
                <p class="mode-label">Mode</p>
                <button class="mode-btn active" data-mode="recruiting">
                    <span class="mode-icon">🎯</span>
                    <div>
                        <span class="mode-title">Recruiting</span>
                        <span class="mode-desc">Find & attract talent</span>
                    </div>
                </button>
                <button class="mode-btn" data-mode="training">
                    <span class="mode-icon">📈</span>
                    <div>
                        <span class="mode-title">Training</span>
                        <span class="mode-desc">Coach your team</span>
                    </div>
                </button>
                <button class="mode-btn" data-mode="customize">
                    <span class="mode-icon">🛠️</span>
                    <div>
                        <span class="mode-title">Customize</span>
                        <span class="mode-desc">Teach the bot your style</span>
                    </div>
                </button>
                <button class="mode-btn" data-mode="practice">
                    <span class="mode-icon">🎭</span>
                    <div>
                        <span class="mode-title">Practice</span>
                        <span class="mode-desc">Role-play & learn</span>
                    </div>
                </button>
            </div>

            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="topics">Topics</button>
                <button class="sidebar-tab" data-tab="history">History</button>
            </div>

            <div class="tab-content" id="tab-topics">
                <div id="quick-topics-list"></div>
            </div>

            <div class="tab-content hidden" id="tab-history">
                <div id="history-list"></div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <span>+</span> New Chat
            </button>
        </aside>

        <main class="chat-area">
            <div class="mobile-mode-bar" id="mobile-mode-bar">
                <button class="mobile-mode-btn active" data-mode="recruiting">
                    <span class="mode-emoji">🎯</span> Recruiting
                </button>
                <button class="mobile-mode-btn" data-mode="training">
                    <span class="mode-emoji">📈</span> Training
                </button>
                <button class="mobile-mode-btn" data-mode="customize">
                    <span class="mode-emoji">🛠️</span> Customize
                </button>
                <button class="mobile-mode-btn" data-mode="practice">
                    <span class="mode-emoji">🎭</span> Practice
                </button>
            </div>

            <header class="chat-header">
                <div class="header-info">
                    <h2 id="header-title">Recruiting Mode</h2>
                    <span class="header-status" id="header-status">Ready to chat</span>
                </div>
                <button class="tts-toggle" id="tts-toggle" title="Toggle voice replies">
                    <svg class="tts-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                    <svg class="tts-icon-on hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                </button>
            </header>

            <div class="messages" id="messages">
                <div class="welcome-message">
                    <div class="welcome-icon">⚡</div>
                    <h2>Welcome to Elliott</h2>
                    <p>I'm your AI-powered sales assistant. I can <strong>recruit</strong>, <strong>train</strong>, <strong>learn your style</strong>, and <strong>practice</strong> with you.</p>
                    <p>Pick a mode from the sidebar and start chatting!</p>
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <textarea
                            id="message-input"
                            placeholder="Type your message..."
                            rows="1"
                            autofocus
                        ></textarea>
                        <button type="button" id="mic-btn" title="Voice input">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                        <button type="submit" id="send-btn" title="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
                <p class="disclaimer">Elliott uses AI. Review important information for accuracy.</p>
            </div>
        </main>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
